name: Update Maven Wrapper

on:
  schedule:
    - cron: '0 19 * * 5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Get latest Maven version
        id: maven
        run: |
          LATEST=$(curl -s "https://search.maven.org/solrsearch/select?q=g:org.apache.maven+a:apache-maven&rows=1&wt=json" \
            | jq -r '.response.docs[0].latestVersion')
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Update wrapper
        run: ./mvnw wrapper:wrapper -Dmaven=${{ steps.maven.outputs.version }}

      - name: Patch SHA512 into wrapper properties
        run: |
          VERSION=${{ steps.maven.outputs.version }}
          SHA=$(curl -s "https://downloads.apache.org/maven/maven-3/${VERSION}/binaries/apache-maven-${VERSION}-bin.zip.sha512")
          PROPS=".mvn/wrapper/maven-wrapper.properties"
          sed -i '/^distributionSha512Sum=/d' "$PROPS"
          echo "distributionSha512Sum=${SHA}" >> "$PROPS"

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@c0f553f # 8.1.0
        with:
          commit-message: "Update maven wrapper to ${{ steps.maven.outputs.version }}"
          title: "Update Maven Wrapper to ${{ steps.maven.outputs.version }}"
          branch: update-maven-wrapper
          delete-branch: true
